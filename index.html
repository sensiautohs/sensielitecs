<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ SENSI ELITE VVIP - AUTO HEADSHOT 2026 ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0b0b0f; color: #f3f4f6; }
        .gaming-font { font-family: 'Oxanium', sans-serif; }
        .fire-shadow { text-shadow: 0 0 10px #ff003c, 0 0 20px #ff003c; }
        .card-glow { box-shadow: 0 0 15px rgba(255, 0, 60, 0.15); border: 1px solid rgba(255, 0, 60, 0.3); }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background-color: #ff003c; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-x-hidden">

    <!-- TOP ANNOUNCEMENT -->
    <div class="bg-red-900/40 border-b border-red-600/50 py-2 px-4 text-center text-xs md:text-sm gaming-font tracking-wider text-red-400">
        📢 SYSTEM: <span id="detected-device" class="font-bold text-white uppercase">Mendeteksi perangkat...</span> Terdeteksi!
    </div>

    <main class="flex-grow container mx-auto px-4 py-6 max-w-lg">
        <div class="text-center my-6">
            <h1 class="gaming-font text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-yellow-500 to-red-600 tracking-wider fire-shadow">
                SENSI ELITE VVIP
            </h1>
        </div>

        <!-- ADBLOCK ALERT -->
        <div id="adblock-banner" class="hidden bg-yellow-600/20 border-2 border-yellow-500/80 rounded-xl p-4 mb-6 text-center animate-pulse">
            <h3 class="font-bold text-yellow-300">⚠️ ADBLOCK TERDETEKSI</h3>
            <p class="text-xs text-gray-300">Matikan Adblock untuk download script.</p>
        </div>

        <!-- BRAND SELECTOR -->
        <div class="bg-gray-900/80 rounded-2xl p-5 mb-6 card-glow">
            <h2 class="gaming-font text-lg font-bold text-red-500 mb-3">🎮 KALIBRASI PERANGKAT</h2>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="selectBrand('Xiaomi')" class="brand-btn bg-gray-800 hover:bg-red-600/20 py-2 rounded-xl text-sm font-semibold transition">Xiaomi</button>
                <button onclick="selectBrand('Infinix')" class="brand-btn bg-gray-800 hover:bg-red-600/20 py-2 rounded-xl text-sm font-semibold transition">Infinix</button>
                <button onclick="selectBrand('Samsung')" class="brand-btn bg-gray-800 hover:bg-red-600/20 py-2 rounded-xl text-sm font-semibold transition">Samsung</button>
                <button onclick="selectBrand('Realme')" class="brand-btn bg-gray-800 hover:bg-red-600/20 py-2 rounded-xl text-sm font-semibold transition">Realme</button>
            </div>
            
            <!-- NEW: LOADING BAR -->
            <div id="progress-bar-container" class="hidden w-full bg-gray-700 rounded-full h-2.5 mb-4">
                <div id="progress-bar" class="bg-red-600 h-2.5 rounded-full" style="width: 0%"></div>
            </div>

            <button id="btn-generate" onclick="generateSensi()" class="w-full bg-red-600 py-3 rounded-xl font-bold transition">⚡ AMBIL SENSI SEKARANG</button>
        </div>

        <!-- AD SCRIPT -->
        <div id="container-96722b5e2c790a6b06da6dbc0cb5d956" class="my-4"></div>

        <!-- RESULTS PANEL -->
        <div id="results-panel" class="hidden bg-gray-900/90 rounded-2xl p-5 mb-6 card-glow">
            <h2 class="text-green-400 font-bold mb-3">✅ SENSI BERHASIL DIKALIBRASI</h2>
            <div class="space-y-2 bg-gray-950 p-4 rounded-xl text-sm mb-4">
                <div class="flex justify-between border-b border-gray-800 pb-2">
                    <span class="text-gray-400">Target:</span>
                    <span id="result-brand" class="font-bold text-white"></span>
                </div>
                <!-- NEW: DPI DISPLAY -->
                <div class="flex justify-between border-b border-gray-800 pb-2">
                    <span class="text-gray-400">DPI Rekomendasi:</span>
                    <span id="val-dpi" class="font-bold text-yellow-400"></span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-400">General Sensi:</span>
                    <span id="val-aim" class="font-bold text-yellow-400">98%</span>
                </div>
            </div>
            <button id="btn-download" onclick="startDownload()" class="w-full bg-green-600 py-3 rounded-xl font-bold">📥 DOWNLOAD SCRIPT VVIP</button>
        </div>

        <!-- CHAT -->
        <div class="bg-gray-900/80 rounded-2xl p-4 card-glow mb-6">
            <h2 class="text-sm font-bold text-red-500 mb-3">💬 TESTIMONI LIVE</h2>
            <div id="chat-box" class="chat-container max-h-[160px] overflow-y-auto space-y-3 pr-2 text-xs"></div>
        </div>
    </main>

    <script>
        const ADSTERRA_DIRECT_LINK = "https://bigotcomet.com/yg5d5m68?key=3f65b078b61df4f332956f06964a1c1f"; 
        let selectedBrandName = "";

        function selectBrand(brand) {
            selectedBrandName = brand;
            document.querySelectorAll(".brand-btn").forEach(b => b.classList.remove('bg-red-600'));
            event.target.classList.add('bg-red-600');
        }

        function generateSensi() {
            if (!selectedBrandName) return alert("Pilih HP dulu bray!");
            
            // NEW: Progress Bar Animation
            const progressBar = document.getElementById("progress-bar");
            document.getElementById("progress-bar-container").classList.remove("hidden");
            let width = 0;
            let interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    document.getElementById("results-panel").classList.remove("hidden");
                    window.open(ADSTERRA_DIRECT_LINK, '_blank');
                } else {
                    width += 5;
                    progressBar.style.width = width + "%";
                }
            }, 100);

            document.getElementById("result-brand").textContent = selectedBrandName.toUpperCase();
            document.getElementById("val-dpi").textContent = (Math.floor(Math.random() * 200) + 400); // Random DPI
        }

        function startDownload() { window.location.href = ADSTERRA_DIRECT_LINK; }

        window.onload = function() {
            const ua = navigator.userAgent;
            document.getElementById("detected-device").textContent = /android/i.test(ua) ? "ANDROID" : "iOS";
            // ... (Chat logic tetep sama)
        }
    </script>
    <script src="https://bigotcomet.com/96722b5e2c790a6b06da6dbc0cb5d956/invoke.js"></script>
</body>
</html>
